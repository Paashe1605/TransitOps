databases:
  - name: transitops-db
    databaseName: transitops
    user: admin
    plan: free

services:
  - type: web
    name: transitops-backend
    env: python
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt && alembic upgrade head && python seed.py"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: transitops-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
